# Deploys the repository contents (static site) to GitHub Pages on every
# push to `main`. No build step — the site is plain HTML/CSS/JS.
#
# `enablement: true` makes the workflow turn Pages on for the repo on its
# first run (avoids the manual "Settings → Pages → Source → GitHub Actions"
# chicken-and-egg). Repo permissions: Actions → "Read and write".
#
# After the first successful run the live URL is:
#   https://<owner>.github.io/OCR-Image-AI/

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Don't cancel an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: false

# Forward-compat: opt into Node.js 24 early. Node 20 actions are deprecated
# Sept 2026 (per GitHub Actions runner changelog).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on first run; otherwise the action 404s.
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Repository root is the site root — no build artifacts.
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
