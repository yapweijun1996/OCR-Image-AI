<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Offline · AI Image OCR</title>
<meta name="theme-color" content="#ff6a3d">
<style>
  :root{
    color-scheme: light dark;
    --bg:#f2f2f7; --fg:#1c1c1e; --muted:#6e6e73; --card:#ffffff; --border:rgba(0,0,0,.08); --accent:#ff6a3d;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#000; --fg:#f5f5f7; --muted:#98989d; --card:#1c1c1e; --border:rgba(255,255,255,.1); }
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%}
  body{
    background:var(--bg); color:var(--fg);
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
             max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
    -webkit-font-smoothing:antialiased;
  }
  .card{
    background:var(--card); border:1px solid var(--border);
    border-radius:22px; padding: clamp(28px, 4vw, 44px);
    max-width: 420px; width:100%; text-align:center;
    box-shadow: 0 10px 40px -20px rgba(0,0,0,.15);
  }
  .glyph{
    width:64px; height:64px; margin: 0 auto 16px;
    background: color-mix(in srgb, var(--accent) 14%, transparent);
    color: var(--accent);
    border-radius: 18px; display:flex; align-items:center; justify-content:center;
    font-size: 30px;
  }
  h1{ margin: 0 0 8px; font-size: clamp(20px, 2.4vw, 24px); font-weight: 600; letter-spacing:-.01em; }
  p{ margin: 0 0 20px; color:var(--muted); font-size: 15px; }
  button{
    appearance:none; border:0; cursor:pointer;
    background: var(--accent); color:#fff;
    font: inherit; font-weight:600; font-size:15px;
    padding: 12px 22px; border-radius: 12px; min-height:44px;
    transition: transform .1s ease, opacity .15s ease;
  }
  button:hover{ opacity:.92 }
  button:active{ transform: scale(.98) }
</style>
</head>
<body>
  <div class="card">
    <div class="glyph">⌁</div>
    <h1>You're offline</h1>
    <p>AI OCR needs an internet connection to reach the model. Reconnect, then try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
